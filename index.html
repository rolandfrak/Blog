<!DOCTYPE html>
<html lang="es">
<head>

    <title>Blog-Roland</title>
    <link rel="icon" href="img/logo.png" type="image/png">
    <link rel="stylesheet" href="css/css-cabeza.css">
    <link rel="stylesheet" href="css/css-blog.css">
</head>
<body>

    <!-- Cabeza -->
    <div id="cabeza"></div>

    <!-- Sección Hero -->
    <section class="hero-blog">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Blog</h1>
            <p>Soluciones y soporte informático avanzado</p>
            <span class="hero-badge">Tecnología & Infraestructura</span>
        </div>
    </section>

<!-- Contenedor Principal del Blog -->
<div class="blog-layout-container">

            <h3 class="sidebar-title">Áreas de Soporte</h3>
            <ul>
                <!-- Ajustamos los href para que apunten directamente a los contenedores -->
                <li><a href="#contenedor-pc">Soporte a PC</a></li>
                <li><a href="#contenedor-software">Soporte a Software</a></li>
                <li><a href="#contenedor-perifericos">Soporte a Periféricos</a></li>
                <li><a href="#contenedor-servidores">Soporte a Servidores</a></li>
                <li><a href="#contenedor-redes">Soporte a Redes</a></li>
            </ul>
        </nav>
    </aside>
</div>

<!-- SECCIONES DINÁMICAS DE PRESENTACIONES (Ocupan todo el ancho) -->

<section id="contenedor-pc" class="servidores-section-wrapper">

</section>


<section id="contenedor-software" class="servidores-section-wrapper">
 
</section>


<section id="contenedor-perifericos" class="servidores-section-wrapper">

</section>

<section id="contenedor-servidores" class="servidores-section-wrapper">
  
</section>

<section id="contenedor-redes" class="servidores-section-wrapper">
  
</section>


    <!-- Pie -->
    <div id="pie"></div>

    <script src="js/js-cabeza.js"></script>
    <script src="js/js-blog.js"></script>
    <script src="js/js-select_pc-blog.js"></script>
    <script src="js/js-select_sofware-blog.js"></script>
    <script src="js/js-select_perifericos-blog.js"></script>
    <script src="js/js-select_servidor-blog.js"></script>
    <script src="js/js-select_redes-blog.js"></script>

</html>
